<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>RD Manager IA - Diagnóstico</title>
    <!-- Carregamento de Scripts com Fallback e Integridade -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --g: #1D9E75; --bg: #F2F0EB; --ink: #1C1C1A; --danger: #E24B4A; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #root { width: 100%; }
        .loading-screen { text-align: center; padding: 20px; }
        .error-panel { background: #fff; border: 1px solid #E4E2DA; border-radius: 18px; padding: 2.5rem; max-width: 500px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .error-title { font-family: 'Syne', sans-serif; color: var(--danger); font-size: 24px; margin-bottom: 1rem; }
        .error-msg { color: #5A5A55; line-height: 1.6; margin-bottom: 1.5rem; font-size: 14px; }
        .error-code { background: #F9F8F5; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #dc3545; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid #eee; }
        .btn { background: var(--g); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
        .diag-box { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div style="font-family: 'Syne', sans-serif; font-weight: 800; color: var(--ink); font-size: 20px; margin-bottom: 10px;">RD Manager IA</div>
            <div style="color: var(--ink3); font-size: 14px;">Carregando interface...</div>
            <script>
                // Diagnóstico visual imediato: se o JS rodar, o fundo muda levemente
                document.body.style.backgroundColor = "#E1F5EE";
            </script>
        </div>
    </div>

    <div class="diag-box">v4.1.0-stable</div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="error-panel" style={{margin:'auto'}}>
                            <div className="error-title">⚠️ Erro de Carregamento</div>
                            <div className="error-msg">
                                Não foi possível carregar a interface do RD Manager. Isso geralmente acontece por um erro de sintaxe no JavaScript ou falha na conexão com o servidor.
                            </div>
                            <div className="error-code">{this.state.error?.toString()}</div>
                            <button className="btn" onClick={() => window.location.reload()}>Tentar Novamente</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- App Principal (Versão Simplificada para Teste) ---
        function App() {
            const [status, setStatus] = useState('Verificando servidor...');
            const [error, setError] = useState(null);

            useEffect(() => {
                fetch('/api/health')
                    .then(r => r.json())
                    .then(d => setStatus(`Servidor Online (v${d.version})`))
                    .catch(e => {
                        console.error(e);
                        setError("Não foi possível conectar ao backend. Verifique se o deploy no Railway foi concluído.");
                    });
            }, []);

            if (error) {
                return (
                    <div className="error-panel" style={{margin:'auto'}}>
                        <div className="error-title">🔌 Erro de Conexão</div>
                        <div className="error-msg">{error}</div>
                        <button className="btn" onClick={() => window.location.reload()}>Recarregar</button>
                    </div>
                );
            }

            return (
                <div style={{textAlign:'center', padding:'40px'}}>
                    <div style={{fontFamily:'Syne', fontSize:'32px', fontWeight:800, marginBottom:'10px'}}>RD Manager IA</div>
                    <div style={{color:'var(--g)', fontWeight:600, marginBottom:'30px'}}>{status}</div>
                    
                    <div style={{background:'#fff', padding:'30px', borderRadius:'20px', border:'1px solid #E4E2DA', maxWidth:'400px', margin:'auto'}}>
                        <p style={{fontSize:'14px', color:'#5A5A55', marginBottom:'20px'}}>
                            A interface básica carregou com sucesso! Se você está vendo esta tela, o problema da "Tela Branca" foi resolvido.
                        </p>
                        <button className="btn" onClick={() => window.location.href = '/api/auth/login'}>Ir para Login</button>
                    </div>
                </div>
            );
        }

        // --- Renderização ---
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } catch (e) {
            document.getElementById('root').innerHTML = `<div style="padding:40px; color:red;">Erro Crítico: ${e.message}</div>`;
        }
    </script>
</body>
</html>
