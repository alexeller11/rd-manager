<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>RD Manager IA</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f14;
      color: white;
    }

    .app {
      display: flex;
    }

    .sidebar {
      width: 240px;
      background: #0f141a;
      padding: 20px;
      height: 100vh;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button.active {
      background: #1f8f5f;
      border-radius: 8px;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .card {
      background: #141a21;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .btn {
      background: #1f8f5f;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-right: 5px;
    }

    .error-box {
      background: #5c1a1a;
      padding: 10px;
      border-radius: 8px;
    }

    input {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      width: 200px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const API = "";

/* =========================
   AUTH
========================= */

function getToken() {
  return localStorage.getItem("rdm_token");
}

function saveSession(data) {
  localStorage.setItem("rdm_token", data.access_token);
}

function clearSession() {
  localStorage.clear();
}

/* =========================
   API
========================= */

async function api(url, options = {}) {
  const token = getToken();

  const res = await fetch(API + url, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token,
      ...(options.headers || {})
    }
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(text);
  }

  return res.json();
}

/* =========================
   LOGIN
========================= */

function Login({ onLogin }) {
  const [user, setUser] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [error, setError] = React.useState("");

  async function handleLogin() {
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username: user, password: pass })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail);

      saveSession(data);
      onLogin();
    } catch (e) {
      setError(e.message);
    }
  }

  return (
    <div style={{padding:40}}>
      <h2>Login</h2>
      {error && <div className="error-box">{error}</div>}
      <input placeholder="Usuário" onChange={e => setUser(e.target.value)} />
      <input type="password" placeholder="Senha" onChange={e => setPass(e.target.value)} />
      <button className="btn" onClick={handleLogin}>Entrar</button>
    </div>
  );
}

/* =========================
   SIDEBAR
========================= */

function Sidebar({ section, setSection, logout }) {
  return (
    <div className="sidebar">
      <h3>RD Manager IA</h3>

      <button className={section==="dashboard"?"active":""} onClick={()=>setSection("dashboard")}>Dashboard</button>
      <button className={section==="clients"?"active":""} onClick={()=>setSection("clients")}>Clientes</button>

      <button onClick={logout}>Sair</button>
    </div>
  );
}

/* =========================
   DASHBOARD
========================= */

function Dashboard({ data }) {
  if (!data) return <div>Carregando...</div>;

  return (
    <div>
      <h2>Dashboard</h2>
      <div className="card">
        <strong>Total clientes:</strong> {data.total_clients}
      </div>
    </div>
  );
}

/* =========================
   CLIENTES
========================= */

function Clients({ clients, refresh }) {
  return (
    <div>
      <h2>Clientes</h2>

      {clients.map(c => (
        <div className="card" key={c.id}>
          <strong>{c.name}</strong>

          <div style={{marginTop:10}}>
            <button className="btn" onClick={()=>runSync(c.id, refresh)}>Rodar Sync RD</button>
          </div>
        </div>
      ))}
    </div>
  );
}

async function runSync(id, refresh) {
  await api("/api/rdsync/run/" + id, { method: "POST" });
  refresh();
}

/* =========================
   APP
========================= */

function App() {
  const [authed, setAuthed] = React.useState(!!getToken());
  const [section, setSection] = React.useState("dashboard");

  const [clients, setClients] = React.useState([]);
  const [dashboard, setDashboard] = React.useState(null);

  async function loadAll() {
    if (!getToken()) return;

    const [c, d] = await Promise.all([
      api("/api/clients/"),
      api("/api/agency/overview")
    ]);

    setClients(c);
    setDashboard(d);
  }

  React.useEffect(() => {
    loadAll();
  }, []);

  function logout() {
    clearSession();
    setAuthed(false);
  }

  if (!authed) return <Login onLogin={()=>setAuthed(true)} />;

  return (
    <div className="app">
      <Sidebar section={section} setSection={setSection} logout={logout} />

      <div className="main">
        {section === "dashboard" && <Dashboard data={dashboard} />}
        {section === "clients" && <Clients clients={clients} refresh={loadAll} />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
