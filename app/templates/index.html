<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>RD Manager IA v4.5</title>
    <!-- Proteção contra extensões que injetam código e quebram o React -->
    <script>
        (function() {
            const noop = () => {};
            const mockEthereum = {
                isMetaMask: false,
                request: () => Promise.resolve([]),
                on: noop,
                removeListener: noop,
                enable: () => Promise.resolve([]),
                send: noop,
                sendAsync: noop
            };
            if (!window.ethereum) {
                window.ethereum = mockEthereum;
            } else {
                try {
                    // Tenta proteger a propriedade se ela não for readonly
                    Object.defineProperty(window, 'ethereum', {
                        value: window.ethereum,
                        writable: false,
                        configurable: false
                    });
                } catch (e) {}
            }
        })();
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#F2F0EB;color:#1C1C1A;min-height:100vh}
        :root{--g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--ink:#1C1C1A;--ink2:#5A5A55;--ink3:#9A9A94;--paper:#FFF;--bg:#F2F0EB;--sf:#FAFAF7;--bd:#E4E2DA;--bd2:#D0CEC6;--warn:#EF9F27;--danger:#E24B4A;--info:#378ADD}
        .sb{position:fixed;left:0;top:0;width:218px;height:100vh;background:var(--ink);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
        .sb-logo{padding:1.2rem 1rem .85rem;border-bottom:1px solid rgba(255,255,255,.08)}
        .logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
        .logo-m{width:26px;height:26px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
        .sb-user{padding:.55rem 1rem;font-size:11px;color:rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
        .sb-body{padding:.5rem .6rem;flex:1}
        .ns{font-size:9px;font-weight:600;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.1em;padding:9px 8px 3px}
        .nb{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.48);font-size:12.5px;cursor:pointer;width:100%;text-align:left;margin-bottom:1px;transition:all .12s}
        .nb:hover{color:rgba(255,255,255,.82);background:rgba(255,255,255,.06)}
        .nb.active{background:var(--g);color:#fff}
        .ni{font-size:13px;width:16px;text-align:center;flex-shrink:0}
        .main{margin-left:218px;padding:2.25rem 2rem;min-height:100vh}
        .ph{margin-bottom:1.5rem}.ph h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:.2rem}
        .ph .sub{font-size:13px;color:var(--ink2)}
        .card{background:var(--paper);border:1px solid var(--bd);border-radius:14px;padding:1.35rem 1.5rem;margin-bottom:1rem}
        .ct{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:.85rem}
        .mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:1.2rem}
        .mc{background:var(--paper);border:1px solid var(--bd);border-radius:12px;padding:.85rem 1.1rem}
        .ml{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem;font-weight:500}
        .mv{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1}
        .btn{padding:7px 15px;border-radius:9px;border:1.5px solid var(--bd);background:transparent;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
        .btn:hover:not(:disabled){border-color:var(--bd2);background:#FAFAF7}
        .btn-p{background:var(--g);color:#fff;border-color:var(--g)}.btn-p:hover:not(:disabled){background:var(--gd);border-color:var(--gd)}
        .btn-ik{background:var(--ink);color:#fff;border-color:var(--ink)}
        .btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
        .btn-d{color:var(--danger);border-color:#f7c1c1}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        input,textarea,select{width:100%;padding:8px 12px;border:1.5px solid var(--bd);border-radius:9px;background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
        input:focus,textarea:focus,select:focus{border-color:var(--g)}
        textarea{min-height:75px;resize:vertical}
        .field{margin-bottom:.8rem}.field label{display:block;font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:.3rem}
        .two{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
        .crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}.crow:last-child{border-bottom:none}
        .av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif}
        .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:5px}
        @keyframes sp{to{transform:rotate(360deg)}}
        .spin-d{border-color:rgba(0,0,0,.1);border-top-color:var(--ink)}
        .res{background:#F9F8F5;border:1px solid var(--bd);border-radius:10px;padding:1rem 1.25rem;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:1rem;max-height:620px;overflow-y:auto}
        .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
        .badge-g{background:#E1F5EE;color:#0F6E56}.badge-y{background:#FFF3D6;color:#8B5A00}.badge-r{background:#FCEBEB;color:#A32D2D}.badge-b{background:#E6F1FB;color:#0C447C}
        .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
        .login-box{background:var(--paper);border:1px solid var(--bd);border-radius:18px;padding:2.5rem 2.25rem;width:100%;max-width:370px}
        .err{background:#FCEBEB;border:1px solid #f7c1c1;color:#A32D2D;border-radius:8px;padding:9px 13px;font-size:13px;margin-bottom:1rem}
    </style>
</head>
<body>
    <div id="root">
        <!-- Loader inicial para evitar tela em branco absoluta -->
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555;">
            <div style="text-align:center;">
                <div style="border:3px solid #f3f3f3;border-top:3px solid #1D9E75;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 15px;"></div>
                <p>Carregando RD Manager IA...</p>
            </div>
        </div>
    </div>
    <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- Configurações de Token ---
        const TOKEN_KEY = 'rdm_v4_token';
        const getToken = () => localStorage.getItem(TOKEN_KEY);
        const setToken = t => t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY);

        // --- API Helper ---
        async function api(method, path, body, isForm = false) {
            const headers = {};
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;

            let fetchBody = null;
            if (body) {
                if (isForm) {
                    headers['Content-Type'] = 'application/x-www-form-urlencoded';
                    fetchBody = new URLSearchParams(body).toString();
                } else {
                    headers['Content-Type'] = 'application/json';
                    fetchBody = JSON.stringify(body);
                }
            }

            try {
                const response = await fetch(path, { method, headers, body: fetchBody });
                
                if (response.status === 401) {
                    setToken(null);
                    window.location.reload();
                    return;
                }

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error(`Erro do servidor: ${text.substring(0, 100)}`);
                }

                if (!response.ok) {
                    throw new Error(data.detail || data.error || 'Erro na requisição');
                }
                return data;
            } catch (err) {
                console.error(`API Error (${path}):`, err);
                throw err;
            }
        }

        // --- Componentes de UI ---
        function ClientSelect({ clients, value, onChange }) {
            return (
                <select value={value} onChange={e => onChange(e.target.value)}>
                    <option value="">Selecione o cliente...</option>
                    {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
            );
        }

        function AICard({ title, children, result, loading }) {
            return (
                <div className="card">
                    <div className="ct">{title}</div>
                    {children}
                    {loading && <div style={{padding:'1rem',color:'var(--ink3)',fontSize:13}}><span className="spin spin-d"/>Processando com IA...</div>}
                    {result && <div className="res">{result}</div>}
                </div>
            );
        }

        // --- Páginas ---
        function Login({ onLogin }) {
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [loading, setLoading] = useState(false);
            const [err, setErr] = useState('');

            const handleSubmit = async e => {
                e.preventDefault();
                if (!u || !p) return;
                setLoading(true);
                setErr('');
                try {
                    const d = await api('POST', '/api/auth/login', { username: u, password: p }, true);
                    setToken(d.access_token);
                    onLogin({ username: d.username, is_admin: d.is_admin });
                } catch (ex) {
                    setErr(ex.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-wrap">
                    <div className="login-box">
                        <div style={{fontFamily:'Syne',fontSize:18,fontWeight:800,display:'flex',alignItems:'center',gap:10,marginBottom:'1.75rem'}}>
                            <div className="logo-m">RD</div>RD Manager IA
                        </div>
                        {err && <div className="err">{err}</div>}
                        <form onSubmit={handleSubmit}>
                            <div className="field"><label>Usuário</label><input value={u} onChange={e => setU(e.target.value)} autoFocus /></div>
                            <div className="field" style={{marginBottom:'1.25rem'}}><label>Senha</label><input type="password" value={p} onChange={e => setP(e.target.value)} /></div>
                            <button className="btn btn-p" type="submit" disabled={loading} style={{width:'100%',justifyContent:'center'}}>
                                {loading ? <><span className="spin"/>Entrando...</> : 'Entrar'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ clients }) {
            const [scores, setScores] = useState([]);
            useEffect(() => {
                api('GET', '/api/health/all').then(setScores).catch(console.error);
            }, []);

            return (
                <div>
                    <div className="ph"><h1>Dashboard</h1><p className="sub">Visão consolidada — {clients.length} clientes</p></div>
                    <div className="mg">
                        <div className="mc"><div className="ml">Clientes</div><div className="mv">{clients.length}</div></div>
                        <div className="mc"><div className="ml">Com dados RD</div><div className="mv">{scores.filter(s => s.has_data).length}</div></div>
                        <div className="mc"><div className="ml">Críticos</div><div className="mv" style={{color:'var(--danger)'}}>{scores.filter(s => s.status === 'red').length}</div></div>
                    </div>
                    {scores.length > 0 && (
                        <div className="card">
                            <div className="ct">Status por Cliente</div>
                            {scores.map(s => (
                                <div key={s.client_id} className="crow">
                                    <div className="av" style={{background: s.status === 'green' ? '#E1F5EE' : s.status === 'yellow' ? '#FFF3D6' : '#FCEBEB', color: s.status === 'green' ? '#0F6E56' : s.status === 'yellow' ? '#8B5A00' : '#A32D2D', width: 38, height: 38}}>{s.score}</div>
                                    <div style={{flex: 1}}><div style={{fontWeight: 500, fontSize: 13}}>{s.client_name}</div><div style={{fontSize: 11, color: 'var(--ink3)'}}>{s.segment || ''}</div></div>
                                    <span className={`badge badge-${s.status === 'green' ? 'g' : s.status === 'yellow' ? 'y' : 'r'}`}>{s.label}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function Clients({ clients, onRefresh }) {
            const SEG = ['E-commerce', 'SaaS', 'Servicos', 'Educacao', 'Saude', 'Varejo', 'Industria', 'Outro'];
            const EMPTY = { name: '', segment: 'E-commerce', website: '', description: '', persona: '', tone: '', main_pain: '', objections: '', rd_crm_token: '' };
            const [show, setShow] = useState(false);
            const [form, setForm] = useState(EMPTY);
            const [editing, setEditing] = useState(null);
            const [rdToken, setRdToken] = useState('');
            const [saving, setSaving] = useState(false);
            const [suggesting, setSuggesting] = useState(false);

            const open = (c = null) => {
                setForm(c ? { ...c } : EMPTY);
                setEditing(c?.id || null);
                setRdToken('');
                setShow(true);
            };

            const suggest = async () => {
                if (!form.website) return alert('Informe o site primeiro');
                setSuggesting(true);
                try {
                    const d = await api('POST', '/api/clients/suggest-data', { website: form.website });
                    setForm(prev => ({ ...prev, ...d }));
                } catch (e) {
                    alert('Erro na IA: ' + e.message);
                } finally {
                    setSuggesting(false);
                }
            };

            const save = async () => {
                setSaving(true);
                try {
                    const payload = { ...form };
                    if (rdToken.trim()) payload.rd_token = rdToken.trim();
                    const res = await api(editing ? 'PUT' : 'POST', editing ? `/api/clients/${editing}` : '/api/clients/', payload);
                    if (!editing) setEditing(res.id);
                    await onRefresh();
                    alert(editing ? 'Atualizado com sucesso!' : 'Cliente criado!');
                    setShow(false);
                } catch (e) {
                    alert(e.message);
                } finally {
                    setSaving(false);
                }
            };

            const del = async id => {
                if (!confirm('Excluir cliente e todos os dados?')) return;
                try {
                    await api('DELETE', `/api/clients/${id}`);
                    onRefresh();
                } catch (e) { alert(e.message); }
            };

            return (
                <div>
                    <div className="ph" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div><h1>Clientes</h1><p className="sub">{clients.length} clientes cadastrados</p></div>
                        <button className="btn btn-p" onClick={() => open()}>+ Novo Cliente</button>
                    </div>
                    {show && (
                        <div className="card">
                            <div className="ct">{editing ? 'Editar Cliente' : 'Novo Cliente'}</div>
                            <div className="two">
                                <div className="field"><label>Nome *</label><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></div>
                                <div className="field"><label>Segmento</label><select value={form.segment} onChange={e => setForm({ ...form, segment: e.target.value })}>{SEG.map(s => <option key={s}>{s}</option>)}</select></div>
                            </div>
                            <div className="two">
                                <div className="field">
                                    <label>Website</label>
                                    <div style={{display: 'flex', gap: 8}}>
                                        <input style={{flex: 1}} value={form.website || ''} onChange={e => setForm({ ...form, website: e.target.value })} placeholder="https://" />
                                        <button className="btn btn-sm" onClick={suggest} disabled={suggesting}>{suggesting ? <span className="spin spin-d"/> : '🪄 IA'}</button>
                                    </div>
                                </div>
                                <div className="field"><label>Token CRM RD Station</label><input type="password" value={form.rd_crm_token || ''} onChange={e => setForm({ ...form, rd_crm_token: e.target.value })} placeholder="Token do CRM" /></div>
                            </div>
                            <div className="field"><label>Descrição do negócio</label><textarea value={form.description || ''} onChange={e => setForm({ ...form, description: e.target.value })} rows={3} /></div>
                            <div className="field"><label>Persona / ICP</label><textarea value={form.persona || ''} onChange={e => setForm({ ...form, persona: e.target.value })} rows={2} /></div>
                            <div className="three">
                                <div className="field"><label>Tom de voz</label><input value={form.tone || ''} onChange={e => setForm({ ...form, tone: e.target.value })} /></div>
                                <div className="field"><label>Principal dor</label><input value={form.main_pain || ''} onChange={e => setForm({ ...form, main_pain: e.target.value })} /></div>
                                <div className="field"><label>Objeções</label><input value={form.objections || ''} onChange={e => setForm({ ...form, objections: e.target.value })} /></div>
                            </div>
                            <div className="field"><label>Token RD Marketing (Fixo)</label><input type="password" value={rdToken} onChange={e => setRdToken(e.target.value)} placeholder="Cole o access_token aqui" /></div>
                            <div style={{display: 'flex', gap: 10, marginTop: '1rem'}}>
                                <button className="btn btn-p" onClick={save} disabled={saving}>{saving ? <><span className="spin"/>Salvando...</> : 'Salvar'}</button>
                                <button className="btn" onClick={() => setShow(false)}>Cancelar</button>
                            </div>
                        </div>
                    )}
                    <div className="card">
                        {clients.length === 0 && <p style={{color: 'var(--ink3)', fontSize: 13}}>Nenhum cliente cadastrado.</p>}
                        {clients.map(c => (
                            <div key={c.id} className="crow">
                                <div className="av" style={{background: '#EEEDFE', color: '#3C3489', width: 36, height: 36}}>{c.name[0].toUpperCase()}</div>
                                <div style={{flex: 1}}><div style={{fontWeight: 500, fontSize: 13}}>{c.name}</div><div style={{fontSize: 11, color: 'var(--ink3)'}}>{c.segment} | {c.website || 'Sem site'}</div></div>
                                <div style={{display: 'flex', gap: 8}}><button className="btn btn-sm" onClick={() => open(c)}>Editar</button><button className="btn btn-sm btn-d" onClick={() => del(c.id)}>Excluir</button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function CRMPage({ clients }) {
            const [cid, setCid] = useState('');
            const [res, setRes] = useState(null);
            const [loading, setLoading] = useState(false);
            const [analyzing, setAnalyzing] = useState(false);
            const [analysis, setAnalysis] = useState('');

            const sync = async () => {
                if (!cid) return alert('Selecione um cliente');
                setLoading(true);
                try {
                    const d = await api('GET', `/api/crm/sync/${cid}`);
                    setRes(d.data);
                } catch (e) { alert(e.message); }
                finally { setLoading(false); }
            };

            const analyze = async () => {
                if (!cid) return alert('Selecione um cliente');
                setAnalyzing(true);
                try {
                    const d = await api('POST', '/api/crm/analyze', { client_id: parseInt(cid) });
                    setAnalysis(d.result);
                } catch (e) { alert(e.message); }
                finally { setAnalyzing(false); }
            };

            return (
                <div>
                    <div className="ph"><h1>RD CRM</h1><p className="sub">Gestão de Vendas e Pipeline</p></div>
                    <div className="card">
                        <div className="field"><label>Cliente</label><ClientSelect clients={clients} value={cid} onChange={setCid} /></div>
                        <div style={{display: 'flex', gap: 10}}>
                            <button className="btn btn-p" onClick={sync} disabled={loading || !cid}>{loading ? <span className="spin"/> : 'Sincronizar CRM'}</button>
                            <button className="btn" onClick={analyze} disabled={analyzing || !cid}>{analyzing ? <span className="spin spin-d"/> : 'Análise Estratégica IA'}</button>
                        </div>
                    </div>
                    {res && (
                        <div className="mg">
                            <div className="mc"><div className="ml">Negócios</div><div className="mv">{res.total_deals}</div></div>
                            <div className="mc"><div className="ml">Ganhos</div><div className="mv" style={{color: 'var(--g)'}}>{res.won_deals}</div></div>
                            <div className="mc"><div className="ml">Receita</div><div className="mv">R$ {res.total_revenue.toLocaleString('pt-BR')}</div></div>
                        </div>
                    )}
                    {analysis && <div className="card"><div className="ct">Análise IA</div><div className="res">{analysis}</div></div>}
                </div>
            );
        }

        function SyncPage({ clients }) {
            const [cid, setCid] = useState('');
            const [res, setRes] = useState(null);
            const [loading, setLoading] = useState(false);

            const syncRD = async () => {
                if (!cid) return alert('Selecione um cliente');
                setLoading(true);
                try {
                    const d = await api('GET', `/api/rd/sync/${cid}`);
                    setRes(d);
                } catch (e) { alert(e.message); }
                finally { setLoading(false); }
            };

            return (
                <div>
                    <div className="ph"><h1>Sincronização</h1><p className="sub">Atualize os dados do RD Marketing</p></div>
                    <div className="card">
                        <div className="field"><label>Cliente</label><ClientSelect clients={clients} value={cid} onChange={setCid} /></div>
                        <button className="btn btn-p" onClick={syncRD} disabled={loading || !cid}>
                            {loading ? <><span className="spin"/>Sincronizando...</> : 'Sincronizar RD Station'}
                        </button>
                    </div>
                    {res && <div className="card"><div className="ct">Resultado</div><div className="res">{JSON.stringify(res.data || res, null, 2)}</div></div>}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [page, setPage] = useState('dashboard');
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);

            const refreshClients = useCallback(async () => {
                try {
                    const d = await api('GET', '/api/clients/');
                    setClients(d);
                } catch (e) { console.error(e); }
            }, []);

            useEffect(() => {
                const token = getToken();
                if (token) {
                    api('GET', '/api/auth/me')
                        .then(u => {
                            setUser(u);
                            refreshClients();
                        })
                        .catch(() => setToken(null))
                        .finally(() => setLoading(false));
                } else {
                    setLoading(false);
                }
            }, [refreshClients]);

            if (loading) return (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}>
                    <span className="spin spin-d" style={{width:30,height:30}}/>
                </div>
            );

            if (!user) return <Login onLogin={u => { setUser(u); refreshClients(); }} />;

            const renderPage = () => {
                switch(page) {
                    case 'dashboard': return <Dashboard clients={clients} />;
                    case 'clients': return <Clients clients={clients} onRefresh={refreshClients} />;
                    case 'crm': return <CRMPage clients={clients} />;
                    case 'sync': return <SyncPage clients={clients} />;
                    default: return <div className="card"><h1>{page}</h1><p>Página em desenvolvimento.</p></div>;
                }
            };

            return (
                <div style={{display: 'flex'}}>
                    <nav className="sb">
                        <div className="sb-logo"><div className="logo"><div className="logo-m">RD</div>RD Manager IA</div></div>
                        <div className="sb-user"><span>{user.username}</span>{user.is_admin && <span className="badge badge-g">Admin</span>}</div>
                        <div className="sb-body">
                            <div className="ns">Principal</div>
                            <button className={`nb ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}><span className="ni">📊</span>Dashboard</button>
                            <button className={`nb ${page === 'clients' ? 'active' : ''}`} onClick={() => setPage('clients')}><span className="ni">👥</span>Clientes</button>
                            <div className="ns">Dados & Integrações</div>
                            <button className={`nb ${page === 'crm' ? 'active' : ''}`} onClick={() => setPage('crm')}><span className="ni">💼</span>RD CRM</button>
                            <button className={`nb ${page === 'sync' ? 'active' : ''}`} onClick={() => setPage('sync')}><span className="ni">🔄</span>Sincronizar</button>
                        </div>
                    </nav>
                    <div className="main">{renderPage()}</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
