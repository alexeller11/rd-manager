<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RD Manager IA</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --bg:#efede8;
      --panel:#f8f7f4;
      --card:#ffffff;
      --text:#181818;
      --muted:#6f6f6f;
      --line:#ded8ce;
      --green:#22a06b;
      --green-dark:#16865a;
      --red:#d84c4c;
      --yellow:#d59a00;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{display:flex;min-height:100vh}
    .sidebar{
      width:270px;
      background:#171717;
      color:#fff;
      padding:24px 18px;
      display:flex;
      flex-direction:column;
      gap:24px;
      border-right:1px solid rgba(255,255,255,.06);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      font-size:18px;
      line-height:1.1;
    }
    .brand-badge{
      width:34px;height:34px;border-radius:10px;
      background:var(--green);display:flex;align-items:center;justify-content:center;
      font-weight:900;
    }
    .nav-group-title{
      color:#7d7d7d;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin:8px 4px;
    }
    .nav-btn{
      width:100%;
      border:0;
      background:transparent;
      color:#d4d4d4;
      padding:12px 14px;
      border-radius:14px;
      text-align:left;
      font-size:15px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .nav-btn.active{
      background:var(--green);
      color:#fff;
      font-weight:700;
    }
    .nav-btn:hover{background:rgba(255,255,255,.06)}
    .main{
      flex:1;
      padding:28px 32px 40px;
      overflow:auto;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:22px;
    }
    .title{
      font-size:28px;
      font-weight:900;
      margin:0 0 6px;
    }
    .subtitle{
      color:var(--muted);
      margin:0;
      font-size:18px;
    }
    .grid{
      display:grid;
      gap:20px;
    }
    .grid.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid.two{grid-template-columns:1.2fr .8fr}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }
    .card h3{
      margin:0 0 14px;
      font-size:20px;
    }
    .kpi-value{
      font-size:34px;
      font-weight:900;
      margin-bottom:6px;
    }
    .muted{color:var(--muted)}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      background:#f4f3ef;
      border:1px solid var(--line);
    }
    .pill.good{color:var(--green-dark)}
    .pill.warn{color:#9a6a00}
    .pill.bad{color:var(--red)}
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .btn{
      border:0;
      background:var(--green);
      color:#fff;
      padding:12px 18px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      font-size:15px;
    }
    .btn:hover{background:var(--green-dark)}
    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.red{
      background:#fff;
      color:var(--red);
      border:1px solid #efc5c5;
    }
    .btn.small{padding:10px 14px;font-size:14px}
    .stack{display:flex;flex-direction:column;gap:14px}
    .client-item,.action-item,.lp-item,.flow-email{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fff;
    }
    .client-head,.row-between{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .client-name{
      font-size:18px;
      font-weight:800;
    }
    .small{font-size:13px}
    .tag{
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:#f4f3ef;
      border:1px solid var(--line);
    }
    .tag.disconnected{color:var(--red)}
    .tag.connected{color:var(--green-dark)}
    .alert-list{display:flex;flex-direction:column;gap:12px}
    .alert{
      padding:14px 16px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
    }
    .alert strong{display:block;margin-bottom:4px}
    .module-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:10px 0 20px;
    }
    .module-btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:800;
    }
    .module-btn.active{
      background:var(--green);
      color:#fff;
      border-color:var(--green);
    }
    select,input,textarea{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid #d9d3c8;
      background:#fff;
      font-size:16px;
    }
    textarea{min-height:120px;resize:vertical}
    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .result-box{
      margin-top:16px;
      padding:18px;
      border-radius:16px;
      background:#f8f7f4;
      border:1px solid var(--line);
      white-space:pre-wrap;
      line-height:1.55;
    }
    .score-badge{
      font-size:30px;
      font-weight:900;
    }
    .priority{
      display:flex;
      align-items:flex-start;
      gap:12px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    .priority-icon{
      width:34px;height:34px;border-radius:12px;background:#f4f3ef;
      display:flex;align-items:center;justify-content:center;font-weight:900;
    }
    .hidden{display:none}
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    @media (max-width: 1200px){
      .grid.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.two{grid-template-columns:1fr}
    }
    @media (max-width: 900px){
      .app{display:block}
      .sidebar{width:100%;border-right:0}
      .main{padding:20px}
      .form-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const API = "";

function getToken(){
  return localStorage.getItem("rdm_token");
}

async function api(path, options = {}) {
  const token = getToken();
  const headers = {
    ...(options.body && !(options.body instanceof FormData) ? {"Content-Type":"application/json"} : {}),
    ...(token ? {"Authorization": "Bearer " + token} : {}),
    ...(options.headers || {})
  };

  const res = await fetch(API + path, {...options, headers});
  const text = await res.text();

  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = text; }

  if (!res.ok) {
    throw new Error(typeof data === "string" ? data : (data?.detail || "Erro do servidor"));
  }

  return data;
}

function LoginScreen({onLogin}) {
  const [username, setUsername] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [error, setError] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  async function handleLogin(e){
    e.preventDefault();
    setError("");
    setLoading(true);
    try{
      const form = new URLSearchParams();
      form.append("username", username);
      form.append("password", password);

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: form.toString()
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data?.detail || "Erro ao entrar");

      localStorage.setItem("rdm_token", data.access_token);
      localStorage.setItem("rdm_user", data.username || username);
      onLogin();
    }catch(err){
      setError(err.message || "Erro ao entrar");
    }finally{
      setLoading(false);
    }
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"#efede8"}}>
      <div className="card" style={{width:"100%",maxWidth:"460px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
          <div className="brand-badge">RD</div>
          <div style={{fontSize:"34px",fontWeight:900,lineHeight:1}}>RD Manager IA</div>
        </div>
        {error && <div className="result-box" style={{background:"#fff1f1",borderColor:"#efc5c5",color:"#a33"}}>{error}</div>}
        <form onSubmit={handleLogin} className="stack" style={{marginTop:"16px"}}>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Usuário</div>
            <input value={username} onChange={e=>setUsername(e.target.value)} />
          </div>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Senha</div>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} />
          </div>
          <button className="btn" disabled={loading}>{loading ? "Entrando..." : "Entrar"}</button>
        </form>
      </div>
    </div>
  );
}

function Sidebar({section, setSection}) {
  return (
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-badge">RD</div>
        <div>RD Manager<br/>IA</div>
      </div>

      <div>
        <div className="nav-group-title">Principal</div>
        <button className={"nav-btn " + (section==="dashboard" ? "active" : "")} onClick={()=>setSection("dashboard")}>📊 Dashboard</button>
        <button className={"nav-btn " + (section==="clients" ? "active" : "")} onClick={()=>setSection("clients")}>👥 Clientes</button>
      </div>

      <div>
        <div className="nav-group-title">Inteligência IA</div>
        <button className={"nav-btn " + (section==="analysis" ? "active" : "")} onClick={()=>setSection("analysis")}>🧠 Análise IA</button>
        <button className={"nav-btn " + (section==="flows" ? "active" : "")} onClick={()=>setSection("flows")}>📧 Flows avançados</button>
        <button className={"nav-btn " + (section==="landing" ? "active" : "")} onClick={()=>setSection("landing")}>🌐 Landing Pages</button>
        <button className={"nav-btn " + (section==="leads" ? "active" : "")} onClick={()=>setSection("leads")}>🧲 Leads & Segmentação</button>
        <button className={"nav-btn " + (section==="insights" ? "active" : "")} onClick={()=>setSection("insights")}>💡 Insights</button>
        <button className={"nav-btn " + (section==="prospect" ? "active" : "")} onClick={()=>setSection("prospect")}>🎯 Prospecção</button>
      </div>
    </aside>
  );
}

function Dashboard({clients}) {
  const connected = clients.filter(c => c.rd_token_set).length;
  const disconnected = clients.length - connected;

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Cockpit da Agência</h1>
          <p className="subtitle">Diagnóstico, prioridade e execução em um só lugar</p>
        </div>
      </div>

      <div className="grid kpis" style={{marginBottom:"20px"}}>
        <div className="card">
          <div className="muted small">Clientes cadastrados</div>
          <div className="kpi-value">{clients.length}</div>
          <div className="muted">Base total da agência</div>
        </div>
        <div className="card">
          <div className="muted small">Clientes conectados RD</div>
          <div className="kpi-value">{connected}</div>
          <div className="muted">Integração ativa</div>
        </div>
        <div className="card">
          <div className="muted small">Clientes desconectados</div>
          <div className="kpi-value">{disconnected}</div>
          <div className="muted">Prioridade operacional</div>
        </div>
        <div className="card">
          <div className="muted small">Score operacional</div>
          <div className="kpi-value">{Math.max(45, Math.min(100, 55 + connected * 8))}</div>
          <div className="muted">Visão geral da agência</div>
        </div>
      </div>

      <div className="grid two">
        <div className="card">
          <div className="section-head">
            <h3>Prioridades da semana</h3>
            <span className="pill warn">Ação imediata</span>
          </div>
          <div className="stack">
            <div className="priority">
              <div className="priority-icon">1</div>
              <div>
                <strong>Conectar todos os clientes ao RD</strong>
                <div className="muted">Sem integração, a ferramenta perde poder analítico e operacional.</div>
              </div>
            </div>
            <div className="priority">
              <div className="priority-icon">2</div>
              <div>
                <strong>Ativar módulo de flows avançados</strong>
                <div className="muted">Transforma planejamento em execução de campanhas.</div>
              </div>
            </div>
            <div className="priority">
              <div className="priority-icon">3</div>
              <div>
                <strong>Mapear landing pages estratégicas</strong>
                <div className="muted">Onde há tráfego e conversão, há oportunidade de ganho rápido.</div>
              </div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="section-head">
            <h3>Alertas</h3>
            <span className="pill bad">Monitoramento</span>
          </div>
          <div className="alert-list">
            <div className="alert">
              <strong>{disconnected} cliente(s) sem RD ativo</strong>
              <div className="muted">Sem token salvo, o status aparece como desconectado e limita automações.</div>
            </div>
            <div className="alert">
              <strong>IA precisa de provider válido</strong>
              <div className="muted">Groq/OpenAI/Gemini precisam estar corretamente configurados para análise e geração.</div>
            </div>
            <div className="alert">
              <strong>Módulos avançados precisam de uso real</strong>
              <div className="muted">Flows, leads e páginas devem virar rotina operacional da agência.</div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function Clients({clients, refreshClients}) {
  const [message, setMessage] = React.useState("");

  async function connectRD(clientId){
    window.open(`/oauth/authorize/${clientId}`, "_blank");
    setMessage("A janela de autenticação foi aberta. Depois de autorizar, atualize a lista.");
  }

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Clientes</h1>
          <p className="subtitle">Gestão da base e status de integração</p>
        </div>
        <button className="btn secondary" onClick={refreshClients}>Atualizar lista</button>
      </div>

      {message && <div className="card" style={{marginBottom:"16px"}}>{message}</div>}

      <div className="stack">
        {clients.map(client => (
          <div className="client-item" key={client.id}>
            <div className="client-head">
              <div>
                <div className="client-name">{client.name}</div>
                <div className="muted">{client.segment || "Sem segmento"} | {client.website || "Sem site"}</div>
              </div>
              <div className={"tag " + (client.rd_token_set ? "connected" : "disconnected")}>
                {client.rd_token_set ? "RD Conectado" : "RD Desconectado"}
              </div>
            </div>

            <div className="actions" style={{marginTop:"14px"}}>
              <button className="btn small" onClick={()=>connectRD(client.id)}>Conectar RD</button>
              <button className="btn small secondary">Editar</button>
              <button className="btn small red">Excluir</button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function Analysis({clients}) {
  const [clientId, setClientId] = React.useState("");
  const [result, setResult] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  async function runAnalysis(){
    if(!clientId) return;
    setLoading(true);
    setResult("");
    try{
      const data = await api("/api/rd/analyze", {
        method:"POST",
        body: JSON.stringify({client_id: Number(clientId), type: "general"})
      });
      setResult(data.result || JSON.stringify(data, null, 2));
    }catch(err){
      setResult("Erro: " + err.message);
    }finally{
      setLoading(false);
    }
  }

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Análise IA</h1>
          <p className="subtitle">Diagnóstico estratégico profundo por cliente</p>
        </div>
      </div>

      <div className="card">
        <div className="small muted" style={{marginBottom:"8px"}}>Cliente</div>
        <select value={clientId} onChange={e=>setClientId(e.target.value)}>
          <option value="">Selecione um cliente</option>
          {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>

        <div className="module-bar">
          <button className="btn" onClick={runAnalysis} disabled={loading}>{loading ? "Analisando..." : "Gerar análise 360°"}</button>
        </div>

        {result && <div className="result-box">{result}</div>}
      </div>
    </>
  );
}

function FlowsAdvanced({clients}) {
  const [form, setForm] = React.useState({goal:"",product:"",audience:"",awareness:""});
  const [flow, setFlow] = React.useState("");
  const [emailResult, setEmailResult] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  function update(key, value){
    setForm(prev => ({...prev,[key]:value}));
  }

  async function generateFlow(){
    setLoading(true);
    setFlow("");
    try{
      const data = await api("/api/flows-adv/generate-flow", {
        method:"POST",
        body: JSON.stringify(form)
      });
      setFlow(data.flow || JSON.stringify(data, null, 2));
    }catch(err){
      setFlow("Erro: " + err.message);
    }finally{
      setLoading(false);
    }
  }

  async function generateEmail(context){
    setEmailResult("Gerando...");
    try{
      const data = await api("/api/flows-adv/generate-email", {
        method:"POST",
        body: JSON.stringify({context})
      });
      setEmailResult(data.email || JSON.stringify(data, null, 2));
    }catch(err){
      setEmailResult("Erro: " + err.message);
    }
  }

  const suggested = [
    {name:"Email 1 — Abertura e contexto", reason:"Introduzir a oferta e criar conexão inicial", timing:"D+0"},
    {name:"Email 2 — Quebra de objeção", reason:"Reduzir insegurança e aumentar confiança", timing:"D+2"},
    {name:"Email 3 — Prova e urgência", reason:"Fazer o lead avançar", timing:"D+4"},
  ];

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Flows avançados</h1>
          <p className="subtitle">Estruture sequências com lógica estratégica e gere cada email em 1 clique</p>
        </div>
      </div>

      <div className="card">
        <div className="form-grid">
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Objetivo</div>
            <input value={form.goal} onChange={e=>update("goal", e.target.value)} placeholder="Ex.: vender serviço premium"/>
          </div>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Produto/Oferta</div>
            <input value={form.product} onChange={e=>update("product", e.target.value)} placeholder="Ex.: consultoria estratégica"/>
          </div>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Público</div>
            <input value={form.audience} onChange={e=>update("audience", e.target.value)} placeholder="Ex.: empresários locais"/>
          </div>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Nível de consciência</div>
            <input value={form.awareness} onChange={e=>update("awareness", e.target.value)} placeholder="Frio, morno, quente"/>
          </div>
        </div>

        <div className="actions" style={{marginTop:"16px"}}>
          <button className="btn" onClick={generateFlow}>{loading ? "Gerando..." : "Gerar fluxo estratégico"}</button>
        </div>

        <div style={{marginTop:"18px"}}>
          <h3>Estrutura sugerida</h3>
          <div className="stack">
            {suggested.map((item, idx) => (
              <div className="flow-email" key={idx}>
                <div className="row-between">
                  <div>
                    <strong>{item.name}</strong>
                    <div className="muted small">Motivo: {item.reason}</div>
                    <div className="muted small">Timing: {item.timing}</div>
                  </div>
                  <button className="btn small" onClick={()=>generateEmail(`${item.name}. ${item.reason}. Timing: ${item.timing}. Contexto: ${JSON.stringify(form)}`)}>
                    Gerar email
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>

        {flow && <div className="result-box">{flow}</div>}
        {emailResult && <div className="result-box" style={{marginTop:"14px"}}>{emailResult}</div>}
      </div>
    </>
  );
}

function LandingPages() {
  const [url, setUrl] = React.useState("");
  const [analysis, setAnalysis] = React.useState("");
  const [copy, setCopy] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  async function analyze(){
    setLoading(true);
    setAnalysis("");
    try{
      const data = await api("/api/landing/analyze", {
        method:"POST",
        body: JSON.stringify({url})
      });
      setAnalysis(JSON.stringify(data, null, 2));
    }catch(err){
      setAnalysis("Erro: " + err.message);
    }finally{
      setLoading(false);
    }
  }

  async function generateCopy(){
    setCopy("Gerando...");
    try{
      const data = await api("/api/landing/generate-copy", {
        method:"POST",
        body: JSON.stringify({
          product:"Serviço premium",
          audience:"Público de alta intenção",
          goal:"Conversão"
        })
      });
      setCopy(data.copy || JSON.stringify(data, null, 2));
    }catch(err){
      setCopy("Erro: " + err.message);
    }
  }

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Landing Pages</h1>
          <p className="subtitle">Analise SEO, copy, conversão e performance por página</p>
        </div>
      </div>

      <div className="card">
        <div className="small muted" style={{marginBottom:"8px"}}>URL da página</div>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://seudominio.com/pagina" />
        <div className="actions" style={{marginTop:"16px"}}>
          <button className="btn" onClick={analyze}>{loading ? "Analisando..." : "Analisar página"}</button>
          <button className="btn secondary" onClick={generateCopy}>Gerar nova copy</button>
        </div>
        {analysis && <div className="result-box">{analysis}</div>}
        {copy && <div className="result-box">{copy}</div>}
      </div>
    </>
  );
}

function Leads() {
  const [dataText, setDataText] = React.useState("");
  const [result, setResult] = React.useState("");

  async function analyzeBase(){
    try{
      const data = await api("/api/leads/analyze-base", {
        method:"POST",
        body: JSON.stringify({raw: dataText})
      });
      setResult(data.analysis || JSON.stringify(data, null, 2));
    }catch(err){
      setResult("Erro: " + err.message);
    }
  }

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Leads & Segmentação</h1>
          <p className="subtitle">Leia a base, identifique oportunidades e gere ações</p>
        </div>
      </div>

      <div className="card">
        <div className="small muted" style={{marginBottom:"8px"}}>Cole os dados da base ou resumo</div>
        <textarea value={dataText} onChange={e=>setDataText(e.target.value)} placeholder="Cole sua base, resumo ou export..." />
        <div className="actions" style={{marginTop:"16px"}}>
          <button className="btn" onClick={analyzeBase}>Analisar base</button>
        </div>
        {result && <div className="result-box">{result}</div>}
      </div>
    </>
  );
}

function Insights() {

function Prospect() {
  const [form, setForm] = React.useState({niche:"", city:"", site:""});
  const [result, setResult] = React.useState("");

  async function analyze(){
    try{
      const data = await api("/api/prospect/analyze-business", {
        method:"POST",
        body: JSON.stringify(form)
      });
      setResult(data.analysis || JSON.stringify(data, null, 2));
    }catch(err){
      setResult("Erro: " + err.message);
    }
  }

  return (
    <>
      <div className="topbar">
        <div>
          <h1 className="title">Prospecção inteligente</h1>
          <p className="subtitle">Ache oportunidade, gere diagnóstico e monte abordagem</p>
        </div>
      </div>

      <div className="card">
        <div className="form-grid">
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Nicho</div>
            <input value={form.niche} onChange={e=>setForm({...form, niche:e.target.value})} placeholder="Ex.: clínica, indústria, loja" />
          </div>
          <div>
            <div className="small muted" style={{marginBottom:"8px"}}>Cidade</div>
            <input value={form.city} onChange={e=>setForm({...form, city:e.target.value})} placeholder="Ex.: Linhares" />
          </div>
          <div style={{gridColumn:"1 / -1"}}>
            <div className="small muted" style={{marginBottom:"8px"}}>Site</div>
            <input value={form.site} onChange={e=>setForm({...form, site:e.target.value})} placeholder="https://empresa.com.br" />
          </div>
        </div>

        <div className="actions" style={{marginTop:"16px"}}>
          <button className="btn" onClick={analyze}>Analisar negócio</button>
        </div>

        {result && <div className="result-box">{result}</div>}
      </div>
    </>
  );
}

function App() {
  const [authed, setAuthed] = React.useState(!!getToken());
  const [section, setSection] = React.useState("dashboard");
  const [clients, setClients] = React.useState([]);

  async function loadClients(){
    try{
      const data = await api("/api/clients/");
      setClients(Array.isArray(data) ? data : []);
    }catch(err){
      console.error(err);
    }
  }

  React.useEffect(()=>{
    if(authed) loadClients();
  }, [authed]);

  if(!authed){
    return <LoginScreen onLogin={()=>setAuthed(true)} />;
  }

  return (
    <div className="app">
      <Sidebar section={section} setSection={setSection} />
      <main className="main">
        {section === "dashboard" && <Dashboard clients={clients} />}
        {section === "clients" && <Clients clients={clients} refreshClients={loadClients} />}
        {section === "analysis" && <Analysis clients={clients} />}
        {section === "flows" && <FlowsAdvanced clients={clients} />}
        {section === "landing" && <LandingPages />}
        {section === "leads" && <Leads />}
        {section === "insights" && <Insights />}
        {section === "prospect" && <Prospect />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
