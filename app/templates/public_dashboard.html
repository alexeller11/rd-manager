<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:2rem 1rem}
.container{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75}
.date{font-size:12px;color:#6b6b65}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#fff;border:1px solid #e2e0d8;border-radius:10px;padding:1rem}
.metric-label{font-size:11px;color:#6b6b65;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:500}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;margin-bottom:.75rem}
.health-row{display:flex;align-items:center;gap:1rem}
.health-score{font-size:48px;font-weight:700;font-family:'Syne',sans-serif}
.health-green{color:#1D9E75}
.health-yellow{color:#EF9F27}
.health-red{color:#E24B4A}
.health-label{font-size:14px;color:#6b6b65;margin-top:4px}
.bars{flex:1}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.bar-label{width:130px;color:#6b6b65;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#f0efe9;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#1D9E75}
.bar-pts{width:40px;text-align:right;color:#aaa;font-size:11px}
.insight-box{background:#f5f4f0;border-radius:8px;padding:1rem;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:13px}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:2rem}
.semaphore{display:flex;gap:6px;margin-top:.5rem}
.sem-dot{width:12px;height:12px;border-radius:50%;opacity:.3}
.sem-dot.active{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div><span id="client-name">Carregando...</span></div>
    <div class="date" id="gen-date"></div>
  </div>

  <div id="content"><div class="loading">Carregando dados...</div></div>
</div>

<script>
const CLIENT_ID = {{CLIENT_ID}};

async function load(){
  try{
    const r = await fetch(`/api/intel/public/${CLIENT_ID}`);
    const d = await r.json();
    document.getElementById('client-name').textContent = d.client.name || 'Dashboard';
    document.getElementById('gen-date').textContent = 'Atualizado em ' + new Date(d.generated_at).toLocaleDateString('pt-BR');
    render(d);
  }catch(e){
    document.getElementById('content').innerHTML = '<div class="loading">Erro ao carregar dados. Sincronize o cliente no RD Manager.</div>';
  }
}

function render(d){
  const m = d.metrics || {};
  const h = d.health || {};
  const breakdown = h.breakdown || {};
  const scoreColor = h.status === 'green' ? 'health-green' : h.status === 'yellow' ? 'health-yellow' : 'health-red';
  const semG = h.status === 'green' ? 'active' : '';
  const semY = h.status === 'yellow' ? 'active' : (h.status === 'green' ? 'active' : '');
  const semR = h.status === 'red' ? 'active' : '';

  document.getElementById('content').innerHTML = `
    <div class="grid4">
      <div class="metric"><div class="metric-label">Leads na base</div><div class="metric-value">${m.total_leads ? m.total_leads.toLocaleString('pt-BR') : '--'}</div></div>
      <div class="metric"><div class="metric-label">Taxa de abertura</div><div class="metric-value">${m.avg_open_rate != null ? m.avg_open_rate + '%' : '--'}</div></div>
      <div class="metric"><div class="metric-label">Taxa de cliques</div><div class="metric-value">${m.avg_click_rate != null ? m.avg_click_rate + '%' : '--'}</div></div>
      <div class="metric"><div class="metric-label">Funis ativos</div><div class="metric-value">${m.funnels_count != null ? m.funnels_count : '--'}</div></div>
    </div>

    <div class="card">
      <div class="card-title">Score de saude digital</div>
      <div class="health-row">
        <div>
          <div class="health-score ${scoreColor}">${h.score || 0}</div>
          <div class="health-label">${h.label || '--'}</div>
          <div class="semaphore">
            <div class="sem-dot ${semR}" style="background:#E24B4A"></div>
            <div class="sem-dot ${semY}" style="background:#EF9F27"></div>
            <div class="sem-dot ${semG}" style="background:#1D9E75"></div>
          </div>
        </div>
        <div class="bars">
          ${Object.entries(breakdown).map(([k,v]) => `
            <div class="bar-row">
              <div class="bar-label">${v.label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.pts/v.max*100)}%"></div></div>
              <div class="bar-pts">${v.pts}/${v.max}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    ${d.weekly_insight ? `
    <div class="card">
      <div class="card-title">Analise da semana ${d.week_ref ? '— ' + d.week_ref : ''}</div>
      <div class="insight-box">${d.weekly_insight}</div>
    </div>` : ''}

    <div class="footer">Gerado pelo RD Manager IA</div>
  `;
}

load();
</script>
</body>
</html>
